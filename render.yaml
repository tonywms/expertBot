services:
  - type: web
    name: expertBot
    runtime: node
    rootDir: bot-server
    buildCommand: |
      npm install
      npx puppeteer browsers install chrome
    startCommand: npm start
    envVars:
      - key: MISTRAL_API_KEY
        sync: false
      - key: WEBHOOK_URL
        value: https://expertbot-h9mm.onrender.com/webhook/runrunit
      - key: PORT
        value: 3000
      - key: PUPPETEER_SKIP_CHROMIUM_DOWNLOAD
        value: false
      - key: PUPPETEER_CACHE_DIR
        value: /opt/render/.cache/puppeteer
      - key: NODE_ENV
        value: production